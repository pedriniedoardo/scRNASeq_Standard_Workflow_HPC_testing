name: env_velocyto
channels:
  - conda-forge
  - bioconda
dependencies:
  # Core Python (Pinned to 3.9 as established)
  - python=3.9
  - pip=25.2 

  # Conda Dependencies
  - numpy=2.0.2
  - scipy=1.13.1
  - cython=3.1.3
  - numba=0.60.0
  - matplotlib=3.9.4
  - scikit-learn=1.6.1
  - h5py=3.14.0
  - click=8.1.8

  # recommended
  - samtools=1.23
  - r-base=4.4.2
  - rpy2=3.6.2

  # Pip Dependencies
  - pip:
    - pysam==0.23.3
    - velocyto==0.17.17